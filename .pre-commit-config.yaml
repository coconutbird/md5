repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
  - repo: https://github.com/doublify/pre-commit-rust
    rev: v1.0
    hooks:
      - id: fmt
      - id: cargo-check
  - repo: local
    hooks:
      - id: clippy
        name: clippy
        entry: cargo clippy --all-targets -- -D warnings -W clippy::pedantic
        language: system
        types: [rust]
        pass_filenames: false
